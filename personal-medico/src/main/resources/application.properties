server.port=8081
spring.application.name=personal-medico-microservice
spring.datasource.url=jdbc:mysql://localhost:3306/veterinaria_personal?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.flyway.enabled=true
logging.level.com.veterinaria.personalmedico=DEBUG
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always

spring.flyway.baseline-on-migrate=true

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30