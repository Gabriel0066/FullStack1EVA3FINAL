server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: root-redirect
          uri: http://localhost:8080
          predicates:
            - Path=/
          filters:
            - RedirectTo=302, /swagger-ui/index.html

        - id: personal-medico
          uri: lb://personal-medico-microservice
          predicates:
            - Path=/api/v1/personal/**
          filters:
            - StripPrefix=0

        - id: delivery-mascotas
          uri: lb://delivery-mascotas-microservice
          predicates:
            - Path=/api/v1/traslados/**
          filters:
            - StripPrefix=0

        - id: personal-medico-swagger
          uri: lb://personal-medico-microservice
          predicates:
            - Path=/swagger-ui/**, /v3/api-docs/personal-medico
          filters:
            - RewritePath=/v3/api-docs/personal-medico, /v3/api-docs

        - id: delivery-mascotas-swagger
          uri: lb://delivery-mascotas-microservice
          predicates:
            - Path=/swagger-ui/**, /v3/api-docs/delivery-mascotas
          filters:
            - RewritePath=/v3/api-docs/delivery-mascotas, /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: false
